services:
  - type: web
    name: trpg-log-editor
    runtime: node
    plan: free
    buildCommand: npm ci && python3 -m pip install --user -r requirements.txt && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SPELLCHECK_PROVIDER
        value: hanspell
